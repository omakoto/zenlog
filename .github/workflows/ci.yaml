name: CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  # Unit tests and static analysis
  test:
    name: Unit Tests & Static Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build zenlog binary
      run: go build -o bin/zenlog ./zenlog/cmd/zenlog

    - name: Check code formatting
      run: |
        # Check if code is properly formatted
        unformatted=$(gofmt -s -l $(find . -type f -name '*.go'))
        if [ -n "$unformatted" ]; then
          echo "The following files are not properly formatted:"
          echo "$unformatted"
          echo "Run 'gofmt -s -w .' to fix formatting issues"
          exit 1
        fi

    - name: Run unit tests
      run: go test -v -race ./...

    - name: Run go vet
      run: go vet ./...

    - name: Install staticcheck
      run: go install honnef.co/go/tools/cmd/staticcheck@latest

    - name: Run staticcheck
      run: staticcheck ./...

  # End-to-end tests
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: test  # Run e2e tests only if unit tests pass

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Create bin directory
      run: mkdir -p bin

    - name: Build zenlog binary
      run: go build -o bin/zenlog ./zenlog/cmd/zenlog

    - name: Run e2e tests
      run: |
        # Run all e2e test scripts
        for test in e2etests/test*.sh; do
          echo "Running $test"
          "$test"
        done

  # Multi-platform testing
  test-matrix:
    name: Cross-Platform Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Build all packages
      run: go build ./...

    - name: Run unit tests
      run: go test -v -race ./...
